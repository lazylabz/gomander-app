name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --draft \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes

  release-darwin:
    name: Build & upload macOS artifacts
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build macOS artifacts
        run: make darwin

      - name: Upload macOS artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            build/bin/gomander-darwin-amd64.dmg \
            build/bin/gomander-darwin-arm64.dmg \
            build/bin/gomander-darwin-amd64.app.zip \
            build/bin/gomander-darwin-arm64.app.zip \
            --clobber

  release-windows:
    name: Build & upload Windows artifacts
    needs: create-release
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build Windows amd64
        working-directory: cmd/gomander
        run: |
          wails build -nsis --platform=windows/amd64 -o=gomander-windows-amd64-portable.exe
          mv ../../build/bin/gomander-amd64-installer.exe ../../build/bin/gomander-windows-amd64-installer.exe

      - name: Build Windows arm64
        working-directory: cmd/gomander
        run: |
          wails build -nsis --platform=windows/arm64 -o=gomander-windows-arm64-portable.exe
          mv ../../build/bin/gomander-arm64-installer.exe ../../build/bin/gomander-windows-arm64-installer.exe

      - name: Upload Windows artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            build/bin/gomander-windows-amd64-portable.exe \
            build/bin/gomander-windows-arm64-portable.exe \
            build/bin/gomander-windows-amd64-installer.exe \
            build/bin/gomander-windows-arm64-installer.exe \
            --clobber

  release-linux:
    name: Build & upload Linux ${{ matrix.arch }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config gcc g++ libc6-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libnss3-dev libxss1 libasound2-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Linux ${{ matrix.arch }} binary
        run: |
          cd cmd/gomander
          wails build -tags webkit2_41
          cd ../..
          mv build/bin/gomander build/bin/gomander-linux-${{ matrix.arch }}

      - name: Build .deb package
        run: |
          bash scripts/create-deb.sh \
            build/bin/gomander-linux-${{ matrix.arch }} \
            ${{ matrix.arch }} \
            "${GITHUB_REF_NAME#v}"

      - name: Upload Linux ${{ matrix.arch }} artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            build/bin/gomander-linux-${{ matrix.arch }} \
            build/bin/gomander_${GITHUB_REF_NAME#v}_${{ matrix.arch }}.deb \
            --clobber
